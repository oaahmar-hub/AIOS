<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="/assets/aios-icon-192.png" type="image/png">
  <title>AIOS Runtime Status</title>
  <style>
    :root { color-scheme: dark; --bg:#090A0B; --panel:rgba(17,19,23,.74); --line:rgba(216,194,138,.22); --text:#F5F7FA; --muted:#9AA0AE; --gold:#D8C28A; --green:#18E0A2; --red:#FF5C7A; }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif; color:var(--text); background:radial-gradient(circle at 68% 18%,rgba(24,224,162,.12),transparent 28%),radial-gradient(circle at 20% 20%,rgba(216,194,138,.13),transparent 30%),var(--bg); }
    main { width:min(1120px,calc(100% - 36px)); margin:0 auto; padding:42px 0; }
    header { display:flex; justify-content:space-between; gap:18px; align-items:flex-start; margin-bottom:28px; }
    h1 { margin:0; font-size:42px; letter-spacing:0; line-height:1; }
    .sub { color:var(--muted); margin-top:8px; }
    .bridge-nav { display:flex; flex-wrap:wrap; gap:8px; margin:0 0 20px; }
    .bridge-nav a { color:var(--text); text-decoration:none; border:1px solid var(--line); border-radius:999px; padding:8px 12px; background:rgba(9,10,11,.5); font-weight:650; }
    .pill { border:1px solid var(--line); border-radius:999px; padding:8px 12px; background:rgba(9,10,11,.5); color:var(--gold); font-weight:650; }
    .grid { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:12px; }
    .card { border:1px solid var(--line); border-radius:8px; background:var(--panel); backdrop-filter:blur(20px); padding:16px; min-height:104px; }
    .label { color:var(--muted); font-size:12px; }
    .value { margin-top:6px; font-size:24px; font-weight:750; }
    .ok { color:var(--green); }
    .bad { color:var(--red); }
    .components { margin-top:16px; display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:10px; }
    .component { border:1px solid rgba(245,247,250,.1); border-radius:8px; padding:12px; background:rgba(9,10,11,.36); }
    .component strong { display:block; }
    .component span { display:block; color:var(--muted); font-size:12px; margin-top:3px; }
    code { color:var(--green); overflow-wrap:anywhere; }
    @media (max-width:760px){ .grid,.components{grid-template-columns:1fr;} header{display:block;} .pill{display:inline-block;margin-top:14px;} h1{font-size:34px;} }
  </style>
</head>
<body>
<main>
  <nav class="bridge-nav" aria-label="AIOS page navigation">
    <a href="AIOS-WEBSITE.html">Website</a>
    <a href="AIOS-DASHBOARD.html" title="Return to Command Center" aria-label="Return to Command Center">Command Center</a>
    <a href="AIOS-RUNTIME-STATUS.html">Runtime Status</a>
    <a href="AIOS-MOBILE-APP.html">Mobile Console</a>
  </nav>
  <header>
    <div>
      <h1>AIOS Runtime</h1>
      <div class="sub">One launchable system: API, router, permission, personality, knowledge, health.</div>
    </div>
    <div class="pill" id="runtimePill">Checking</div>
  </header>
  <section class="grid">
    <div class="card"><div class="label">Status</div><div class="value" id="status">...</div></div>
    <div class="card"><div class="label">API Status</div><div class="value" id="apiStatus">...</div></div>
    <div class="card"><div class="label">Production Ready</div><div class="value" id="ready">...</div></div>
    <div class="card"><div class="label">Intelligence Ready</div><div class="value" id="intelligence">...</div></div>
    <div class="card"><div class="label">Start Command</div><div class="value" style="font-size:14px"><code id="command">...</code></div></div>
  </section>
  <section class="card" style="margin-top:12px">
    <div class="label">Health Endpoint</div>
    <div class="value" style="font-size:16px"><code id="health">/api/health</code></div>
    <div class="components" id="components"></div>
</section>
</main>
<script>
function escapeHTML(value) {
  return String(value || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function safeConfiguredApiBase() {
  try {
    return window.AIOS_API_BASE_URL || localStorage.getItem('AIOS_API_BASE_URL') || '';
  } catch (_) {
    return window.AIOS_API_BASE_URL || '';
  }
}
function aiosApiBase() {
  const configured = safeConfiguredApiBase();
  return String(configured || '').replace(/\/$/, '');
}
function aiosApiUrl(path) {
  return `${aiosApiBase()}${path}`;
}
function renderComponents(components) {
  return components.map(item => {
    const ready = item.status === 'ready';
    return `<div class="component"><strong class="${ready ? 'ok' : 'bad'}">${escapeHTML(item.name)} · ${escapeHTML(item.status)}</strong><span>${escapeHTML(item.capability)}</span><span>${escapeHTML(item.file)}</span></div>`;
  }).join('');
}
async function loadStatus(){
  const pill = document.getElementById('runtimePill');
  let localStatus = null;
  try {
    const res = await fetch(aiosApiUrl('/api/health'), {cache:'no-store'});
    if (!res.ok) throw new Error('health_' + res.status);
    const data = await res.json();
    document.getElementById('status').textContent = String(data.status || 'unknown').toUpperCase();
    document.getElementById('status').className = 'value ' + (data.status === 'ready' ? 'ok' : 'bad');
    document.getElementById('apiStatus').textContent = 'CONNECTED';
    document.getElementById('apiStatus').className = 'value ok';
    document.getElementById('ready').textContent = `${data.production_ready_percent || 0}%`;
    document.getElementById('intelligence').textContent = (data.components || []).some(item => item.kind === 'knowledge') ? 'READY' : 'CHECK';
    document.getElementById('command').textContent = data.start_command || '';
    document.getElementById('health').textContent = data.health_endpoint || '/api/health';
    pill.textContent = data.mac_dependency ? 'Mac Dependency: YES' : 'Mac Dependency: NO';
    const components = data.components || [];
    document.getElementById('components').innerHTML = renderComponents(components);
  } catch (error) {
    try {
      const local = await fetch('automation/central_orchestrator/reports/AIOS_RUNTIME_STATUS.json', {cache:'no-store'});
      if (local.ok) localStatus = await local.json();
    } catch (_) {}
    const data = localStatus || {};
    const components = data.components || [];
    const ready = data.status === 'ready';
    pill.textContent = localStatus ? 'Local Runtime Data' : 'API Offline';
    document.getElementById('status').textContent = ready ? 'READY' : 'OFFLINE';
    document.getElementById('status').className = 'value ' + (ready ? 'ok' : 'bad');
    document.getElementById('apiStatus').textContent = 'LOCAL';
    document.getElementById('apiStatus').className = 'value ok';
    document.getElementById('ready').textContent = data.production_ready_percent ? `${data.production_ready_percent}%` : '0%';
    document.getElementById('intelligence').textContent = components.some(item => item.kind === 'knowledge') ? 'READY' : 'CHECK';
    document.getElementById('command').textContent = data.start_command || 'python3 automation/central_orchestrator/runtime/aios_runtime.py start';
    document.getElementById('components').innerHTML = renderComponents(components);
  }
}
loadStatus();
</script>
</body>
</html>
